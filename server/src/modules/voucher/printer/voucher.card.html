<div class="voucher">

    <div class="top">

        <div class="logo">
            📶
        </div>

        <div class="title">
            SKYGRID VENDO
        </div>

        <div class="subtitle">
            PREPAID INTERNET VOUCHER
        </div>

    </div>

    <div class="content">

        <table>

            <tr>

                <td>Package</td>

                <td>{{PACKAGE}}</td>

            </tr>

            <tr>

                <td>Price</td>

                <td>₱{{PRICE}}</td>

            </tr>

            <tr>

                <td>Duration</td>

                <td>{{DURATION}}</td>

            </tr>

        </table>

        <div class="code">

            {{CODE}}

        </div>

        <div class="bottom">

            <img
                class="qr"
                src="{{QRCODE}}"
            >

            <div class="scan">

                Scan to Login

            </div>

        </div>

    </div>

    <div class="footer">

        www.skygridwifi.com

    </div>

</div>
