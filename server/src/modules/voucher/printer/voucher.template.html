<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<title>SkyGrid Vendo Vouchers</title>

<style>

@page{
    size:A4;
    margin:10mm;
}

*{
    box-sizing:border-box;
    margin:0;
    padding:0;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#ffffff;
}

.page{

    width:190mm;
    margin:auto;

    display:grid;

    grid-template-columns:repeat(3,1fr);

    gap:8mm;

}

.voucher{

    height:64mm;

    border:2px solid #1565c0;

    border-radius:8px;

    padding:10px;

    position:relative;

}

.header{

    text-align:center;

    color:#1565c0;

    font-weight:bold;

    font-size:18px;

}

.subtitle{

    text-align:center;

    font-size:11px;

    margin-bottom:8px;

}

.info{

    font-size:12px;

    margin-top:5px;

    line-height:18px;

}

.label{

    color:#888;

}

.code{

    margin-top:10px;

    text-align:center;

}

.code span{

    display:inline-block;

    border:2px solid #000;

    padding:6px 14px;

    font-size:22px;

    font-weight:bold;

    letter-spacing:3px;

}

.bottom{

    display:flex;

    justify-content:space-between;

    align-items:center;

    margin-top:10px;

}

.qr{

    width:70px;

    height:70px;

}

.footer{

    position:absolute;

    bottom:8px;

    left:10px;

    right:10px;

    font-size:9px;

    text-align:center;

    color:#666;

}

</style>

</head>

<body>

<div class="page">

{{VOUCHERS}}

</div>

</body>

</html>
